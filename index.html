<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Release Tracker — The Ludoquist</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --header-bg: #1a1a2e;
  --border: #e2e6ea;
  --text: #1a1a2e;
  --muted: #6c757d;
  --light: #adb5bd;
  --tile-red: #fff0f0;
  --tile-red-b: #f5c6c6;
  --tile-red-h: #e74c3c;
  --tile-amber: #fffbf0;
  --tile-amber-b: #f5e6c0;
  --tile-amber-h: #f39c12;
  --tile-green: #f0fff4;
  --tile-green-b: #b7e4c7;
  --tile-green-h: #27ae60;
  --shadow: 0 2px 8px rgba(0,0,0,0.07);
  --shadow-h: 0 6px 20px rgba(0,0,0,0.12);
  --r: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--header-bg); color: white; padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
.header-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; }
.header-title span { opacity: 0.45; font-weight: 400; }
.header-sub { font-family: 'DM Mono', monospace; font-size: 0.68rem; opacity: 0.5; margin-top: 0.15rem; }
.header-right { display: flex; align-items: center; gap: 1rem; }
.sync-label { font-family: 'DM Mono', monospace; font-size: 0.68rem; opacity: 0.55; text-align: right; line-height: 1.5; }
.sync-label strong { display: block; font-size: 0.78rem; opacity: 1; }
.btn-refresh { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.8rem; padding: 0.4rem 1rem; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); color: white; cursor: pointer; transition: background 0.15s; }
.btn-refresh:hover { background: rgba(255,255,255,0.2); }
.btn-refresh:disabled { opacity: 0.35; cursor: default; }

.stats-bar { background: white; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: repeat(4,1fr); }
.stat { padding: 0.9rem 1.25rem; border-right: 1px solid var(--border); text-align: center; }
.stat:last-child { border-right: none; }
.stat-n { font-size: 1.7rem; font-weight: 800; line-height: 1; }
.stat-n.red { color: var(--tile-red-h); }
.stat-l { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-top: 0.2rem; }

.toolbar { padding: 0.85rem 1.5rem; background: white; border-bottom: 1px solid var(--border); display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
.toolbar input { flex: 1; min-width: 140px; max-width: 240px; padding: 0.4rem 0.8rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 0.85rem; outline: none; }
.toolbar input:focus { border-color: var(--muted); }
.filters { display: flex; gap: 0.35rem; flex-wrap: wrap; }
.fb { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.72rem; padding: 0.3rem 0.75rem; border-radius: 20px; border: 1.5px solid var(--border); background: white; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.fb:hover { border-color: var(--muted); color: var(--text); }
.fb.active { background: var(--header-bg); color: white; border-color: var(--header-bg); }
.status { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-left: auto; }

.main { padding: 1.25rem 1.5rem; }
.sec-head { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 1.5rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 2px solid var(--border); }
.sec-head:first-child { margin-top: 0; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }

/* TILE */
.tile { background: white; border: 1.5px solid var(--border); border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; transition: box-shadow 0.2s, transform 0.15s; }
.tile:hover { box-shadow: var(--shadow-h); transform: translateY(-2px); }
.tile.s1 { background: var(--tile-red);   border-color: var(--tile-red-b); }
.tile.s2 { background: var(--tile-amber); border-color: var(--tile-amber-b); }
.tile.s3 { background: var(--tile-green); border-color: var(--tile-green-b); }

.th { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 0.9rem; background: rgba(0,0,0,0.025); border-bottom: 1px solid rgba(0,0,0,0.055); }
.tile.s1 .th { background: rgba(231,76,60,0.06);  border-bottom-color: var(--tile-red-b); }
.tile.s2 .th { background: rgba(243,156,18,0.06); border-bottom-color: var(--tile-amber-b); }
.tile.s3 .th { background: rgba(39,174,96,0.06);  border-bottom-color: var(--tile-green-b); }

.tdate { text-align: center; min-width: 40px; }
.tday { font-size: 1.45rem; font-weight: 800; line-height: 1; }
.tmon { font-family: 'DM Mono', monospace; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
.tyr  { font-family: 'DM Mono', monospace; font-size: 0.57rem; color: var(--light); }

.th-mid { flex: 1; min-width: 0; }
.gtag { display: inline-block; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 0.15rem 0.5rem; border-radius: 20px; color: white; }
.g-lorcana   { background: #9b59b6; }
.g-mtg       { background: #c0392b; }
.g-riftbound { background: #e67e22; }
.g-pokemon   { background: #c5a200; }
.g-onepiece  { background: #2980b9; }
.g-starwars  { background: #16a085; }
.g-other     { background: #7f8c8d; }

.cd { font-family: 'DM Mono', monospace; font-size: 0.65rem; font-weight: 500; padding: 0.18rem 0.55rem; border-radius: 20px; white-space: nowrap; background: rgba(0,0,0,0.055); color: var(--muted); }
.cd.hot  { background: rgba(231,76,60,0.12);  color: var(--tile-red-h); }
.cd.soon { background: rgba(243,156,18,0.12); color: var(--tile-amber-h); }
.cd.past { background: rgba(0,0,0,0.03); color: var(--light); }

.tb { padding: 0.8rem 0.9rem; }
.ttitle { font-size: 0.92rem; font-weight: 700; line-height: 1.35; margin-bottom: 0.45rem; }
.ttags { display: flex; gap: 0.4rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
.ttag-release  { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 0.15rem 0.5rem; border-radius: 20px; background: #e8f8f0; color: #1e8449; border: 1px solid #a9dfbf; }
.ttag-preorder { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 0.15rem 0.5rem; border-radius: 20px; background: #fef9e7; color: #b7950b; border: 1px solid #f9e79f; }
.tnote { font-size: 0.73rem; color: var(--muted); line-height: 1.5; }

.tchecks { display: flex; padding: 0.6rem 0.9rem; border-top: 1px solid rgba(0,0,0,0.055); background: rgba(0,0,0,0.018); gap: 0.4rem; }
.tile.s1 .tchecks { border-top-color: var(--tile-red-b);   background: rgba(231,76,60,0.03); }
.tile.s2 .tchecks { border-top-color: var(--tile-amber-b); background: rgba(243,156,18,0.03); }
.tile.s3 .tchecks { border-top-color: var(--tile-green-b); background: rgba(39,174,96,0.03); }

.ci { display: flex; align-items: center; gap: 0.3rem; flex: 1; cursor: pointer; user-select: none; }
.ci input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--header-bg); cursor: pointer; flex-shrink: 0; }
.ci span { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--light); transition: color 0.15s; }
.ci input:checked + span { color: var(--text); }

.empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }

@media(max-width:600px) {
  .stats-bar { grid-template-columns: repeat(2,1fr); }
  .grid { grid-template-columns: 1fr; }
  .header, .main { padding: 1rem; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">TCG Tracker <span>/ The Ludoquist</span></div>
    <div class="header-sub">RELEASE DATES · PRE-ORDER DEADLINES · TASK PROGRESS</div>
  </div>
  <div class="header-right">
    <div class="sync-label"><strong id="sync-val">—</strong>LAST UPDATED</div>
    <button class="btn-refresh" id="rbtn" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-n" id="s0">—</div><div class="stat-l">Total events</div></div>
  <div class="stat"><div class="stat-n" id="s1">—</div><div class="stat-l">Upcoming</div></div>
  <div class="stat"><div class="stat-n red" id="s2">—</div><div class="stat-l">This week</div></div>
  <div class="stat"><div class="stat-n" id="s3">—</div><div class="stat-l">All done ✓</div></div>
</div>

<div class="toolbar">
  <input type="text" id="sq" placeholder="Search…" oninput="render()">
  <div class="filters">
    <button class="fb active" onclick="sf('all',this)">All</button>
    <button class="fb" onclick="sf('release',this)">Releases</button>
    <button class="fb" onclick="sf('preorder',this)">Pre-orders</button>
    <button class="fb" onclick="sf('week',this)">This week</button>
    <button class="fb" onclick="sf('month',this)">30 days</button>
    <button class="fb" onclick="sf('todo',this)">To-do</button>
  </div>
  <span class="status" id="smsg">Loading…</span>
</div>

<div class="main" id="main"></div>

<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DATA_URL = 'data.csv';

let events = [];
let checks = {};
let filt = 'all';

function ekey(e) { return e.date + '||' + e.title; }
function loadCk() { try { return JSON.parse(localStorage.getItem('tcg_ck') || '{}'); } catch { return {}; } }
function saveCk() { localStorage.setItem('tcg_ck', JSON.stringify(checks)); }

function parseCSV(txt) {
  const lines = txt.trim().split('\n');
  if (lines.length < 2) return [];
  return lines.slice(1).map(ln => {
    const c = []; let cur = '', q = false;
    for (const ch of ln) {
      if (ch === '"') q = !q;
      else if (ch === ',' && !q) { c.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    c.push(cur.trim());
    return { title: c[0]||'', game: c[1]||'Other', type: (c[2]||'release').toLowerCase(), date: c[3]||'', note: c[4]||'' };
  }).filter(e => e.title && e.date);
}

async function loadData() {
  const btn = document.getElementById('rbtn');
  const smsg = document.getElementById('smsg');
  btn.disabled = true; smsg.textContent = 'Loading…';
  try {
    const res = await fetch(DATA_URL + '?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const txt = await res.text();
    const parsed = parseCSV(txt);
    if (!parsed.length) throw new Error('data.csv appears empty');
    events = parsed;
    const now = new Date();
    document.getElementById('sync-val').textContent =
      now.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) + ' ' +
      now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    smsg.textContent = '✓ ' + parsed.length + ' events loaded';
    render();
  } catch(e) { smsg.textContent = '✗ ' + e.message; }
  btn.disabled = false;
}

function du(d) { return Math.ceil((new Date(d) - new Date()) / 86400000); }
function cdlbl(d) { const n=du(d); if(n<0) return Math.abs(n)+'d ago'; if(n===0) return 'TODAY'; if(n===1) return 'TOMORROW'; return n+' days'; }
function cdcls(d) { const n=du(d); if(n<0) return 'past'; if(n<=3) return 'hot'; if(n<=14) return 'soon'; return ''; }
function ticks(k) { const c=checks[k]||{}; return (c.o?1:0)+(c.c?1:0)+(c.a?1:0); }
function scls(k) { const n=ticks(k); return n===0?'':n===1?'s1':n===2?'s2':'s3'; }
function gcls(g) { const m={'Lorcana':'g-lorcana','Magic: The Gathering':'g-mtg','Riftbound':'g-riftbound','Pokémon':'g-pokemon','One Piece':'g-onepiece','Star Wars: Unlimited':'g-starwars'}; return m[g]||'g-other'; }

function onck(k, f, v) {
  if (!checks[k]) checks[k] = {o:false,c:false,a:false};
  checks[k][f] = v; saveCk();
  const t = document.querySelector('[data-key="'+CSS.escape(k)+'"]');
  if (t) { t.className = 'tile ' + scls(k); }
  stats();
}

function sf(f, el) {
  filt = f;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filtered() {
  const q = (document.getElementById('sq').value||'').toLowerCase();
  return events.filter(e => {
    if (q && !e.title.toLowerCase().includes(q) && !e.game.toLowerCase().includes(q)) return false;
    const n = du(e.date), k = ekey(e);
    if (filt==='release')  return e.type==='release';
    if (filt==='preorder') return e.type==='preorder';
    if (filt==='week')     return n>=0&&n<=7;
    if (filt==='month')    return n>=0&&n<=30;
    if (filt==='todo')     return ticks(k)<3;
    return true;
  });
}

function stats() {
  document.getElementById('s0').textContent = events.length;
  document.getElementById('s1').textContent = events.filter(e=>du(e.date)>=0).length;
  document.getElementById('s2').textContent = events.filter(e=>{const n=du(e.date);return n>=0&&n<=7;}).length;
  document.getElementById('s3').textContent = events.filter(e=>ticks(ekey(e))===3).length;
}

function tile(e) {
  const k = ekey(e), d = new Date(e.date), c = checks[k]||{};
  const ks = k.replace(/"/g,'&quot;');
  return `<div class="tile ${scls(k)}" data-key="${ks}">
  <div class="th">
    <div class="tdate"><div class="tday">${d.getDate()}</div><div class="tmon">${MONTHS[d.getMonth()]}</div><div class="tyr">${d.getFullYear()}</div></div>
    <div class="th-mid"><span class="gtag ${gcls(e.game)}">${e.game}</span></div>
    <div class="cd ${cdcls(e.date)}">${cdlbl(e.date)}</div>
  </div>
  <div class="tb">
    <div class="ttitle">${e.title}</div>
    <div class="ttags"><span class="ttag-${e.type}">${e.type==='release'?'Release':'Pre-order'}</span></div>
    ${e.note?`<div class="tnote">${e.note}</div>`:''}
  </div>
  <div class="tchecks">
    <label class="ci"><input type="checkbox" ${c.o?'checked':''} onchange="onck('${ks}','o',this.checked)"><span>Ordered</span></label>
    <label class="ci"><input type="checkbox" ${c.c?'checked':''} onchange="onck('${ks}','c',this.checked)"><span>Created</span></label>
    <label class="ci"><input type="checkbox" ${c.a?'checked':''} onchange="onck('${ks}','a',this.checked)"><span>Advertised</span></label>
  </div>
</div>`;
}

function render() {
  stats();
  const evs = filtered().sort((a,b)=>new Date(a.date)-new Date(b.date));
  const up = evs.filter(e=>du(e.date)>=0), past = evs.filter(e=>du(e.date)<0);
  const main = document.getElementById('main');
  if (!evs.length) { main.innerHTML='<div class="empty">No events match this filter.</div>'; return; }
  let h = '';
  if (up.length)   h += `<div class="sec-head">Upcoming — ${up.length}</div><div class="grid">${up.map(tile).join('')}</div>`;
  if (past.length) h += `<div class="sec-head">Past — ${past.length}</div><div class="grid">${past.map(tile).join('')}</div>`;
  main.innerHTML = h;
}

window.addEventListener('DOMContentLoaded', () => { checks = loadCk(); loadData(); });
</script>
</body>
</html>
